<DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flex box</title>
    <style>
    logo{
      width:30px;
    }
    body{
      margin:10px ;
      border: 1px solid black;
      width: 100%;
      height: 90%;
    }
    main{
      display:flex;
      justify-content:space-around;
      border: 1px solid black;
      margin: 10px;
    }
    ab,cd;{
      display: flex;
      flex-direction:column ;
    }
    box1{
      margin: 50px;
      padding: 10px 50px;
      font-size: 20px;
      padding-bottom:100px ;
      
    }
    navbar{
      border: 1px solid black;
      padding: 100px;
      
    }
    box2{
      margin: 20px;
      font-size: 20px;
      pad: 20px;
    }
    footer{
      text-align: center;
      
      
    }
      
      
      
      
      
    </style>
</head>
<body>
   <header>
      <div class="box">
         <div class="logo">
         <img src="garena.jpg" alt="photo">
  
       </div>
      <div class="navbar">
       <div>
         <h1 class="Welcome"><marque>Bienvenue</marque></h1>
       </div>
       
      </div>
      <div class="navbar">
          <button>Acceuil</button>
          <button>A propos</button>
          <button>Service</button>
          <button>Contact</button>
          
      </div>
       </div>
    
   </header>
   <main>
         <div class="ab">
         <button class="box1">A</button>
         <button class="box1">B</button>
         
        </div>
        <div class="cd">
         <button class="box1">C</button>
         <button class="box1">D</button>
        
        </div>
   </main>
   <footer>
    <button class="box2">A</button>
    <button class="box2">B</button>
    <button class="box2">C</button>
    <button class="box2">D</button>
   </footer>

</body>
</html>
